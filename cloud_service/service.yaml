apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: halo-cognitive
  annotations:
    run.googleapis.com/launch-stage: GA
spec:
  template:
    metadata:
      annotations:
        # Single instance — in-memory sessions require affinity
        autoscaling.knative.dev/maxScale: "1"
        autoscaling.knative.dev/minScale: "1"
        # Keep CPU allocated even when idle (no cold-start throttling)
        run.googleapis.com/cpu-throttling: "false"
    spec:
      containerConcurrency: 1
      containers:
        - image: gcr.io/${PROJECT_ID}/halo-cognitive:latest
          ports:
            - containerPort: 8080
          resources:
            limits:
              memory: 2Gi
              cpu: "2"
          env:
            - name: HALO_PLANNER_MODEL
              value: gemini-3.1-flash-lite-preview
            - name: HALO_VLM_MODEL
              value: gemini-3.1-flash-lite-preview
            - name: HALO_FIRESTORE_ENABLED
              value: "true"
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: google-api-key
                  key: latest
            - name: HALO_CLOUD_API_KEY
              valueFrom:
                secretKeyRef:
                  name: halo-cloud-api-key
                  key: latest
